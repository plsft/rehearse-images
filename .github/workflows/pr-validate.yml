name: pr-validate
on:
  pull_request:
    branches: [main]
    paths:
      - 'matrix.yaml'
      - 'shared/**'
      - 'node/**'
      - 'python/**'
      - 'bun/**'
      - 'go/**'
      - 'java/**'
      - 'dotnet/**'
      - 'ruby/**'
      - 'php/**'
      - 'combos/**'

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.read.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "images=$(yq -o=json '.images' matrix.yaml | jq -c)" >> "$GITHUB_OUTPUT"

  validate:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (amd64 only, no push)
        run: |
          slug=$(echo '${{ matrix.image.id }}' | tr ':' '-')
          docker buildx build \
            --platform linux/amd64 \
            --tag rehearse-pr/$slug \
            --load \
            --file ${{ matrix.image.dir }}/Dockerfile \
            .
      - name: Smoke
        run: |
          slug=$(echo '${{ matrix.image.id }}' | tr ':' '-')
          docker run --rm rehearse-pr/$slug sh /smoke.sh
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rehearse-pr/$(echo '${{ matrix.image.id }}' | tr ':' '-')
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
