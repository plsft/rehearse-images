name: publish
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'matrix.yaml'
      - 'shared/**'
      - 'node/**'
      - 'python/**'
      - 'bun/**'
      - 'go/**'
      - 'java/**'
      - 'dotnet/**'
      - 'ruby/**'
      - 'php/**'
      - 'combos/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.read.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          set -euo pipefail
          echo "images=$(yq -o=json '.images' matrix.yaml | jq -c)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    env:
      GHCR_OWNER: rehearse-sh
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Slug image id
        id: slug
        env:
          IMAGE_ID: ${{ matrix.image.id }}
        run: |
          slug=$(echo "$IMAGE_ID" | tr ':' '-')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Build (multi-arch)
        env:
          IMAGE_DIR: ${{ matrix.image.dir }}
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "ghcr.io/$GHCR_OWNER/$SLUG:latest" \
            --tag "ghcr.io/$GHCR_OWNER/$SLUG:$(date -u +%Y%m%d)" \
            --output type=registry \
            --file "$IMAGE_DIR/Dockerfile" \
            .

      - name: Smoke (amd64)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: docker run --rm --platform linux/amd64 "ghcr.io/$GHCR_OWNER/$SLUG:latest" sh /smoke.sh

      - name: Smoke (arm64)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: docker run --rm --platform linux/arm64 "ghcr.io/$GHCR_OWNER/$SLUG:latest" sh /smoke.sh

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/${{ steps.slug.outputs.slug }}:latest
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Cosign sign (keyless OIDC)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: cosign sign --yes "ghcr.io/$GHCR_OWNER/$SLUG:latest"

      - name: Update Pro catalog
        env:
          IMAGE_ID: ${{ matrix.image.id }}
          CATALOG_ADMIN_TOKEN: ${{ secrets.CATALOG_ADMIN_TOKEN }}
        run: |
          if [ -z "$CATALOG_ADMIN_TOKEN" ]; then
            echo "CATALOG_ADMIN_TOKEN unset, skipping catalog update"
            exit 0
          fi
          lang="${IMAGE_ID%%:*}"
          tag="${IMAGE_ID##*:}"
          version="${tag%%-*}"
          now=$(($(date +%s) * 1000))
          payload=$(jq -n \
            --arg id "$IMAGE_ID" \
            --arg lang "$lang" \
            --arg version "$version" \
            --arg variant 'warm' \
            --arg display "$IMAGE_ID" \
            --arg desc "$IMAGE_ID auto-published from rehearse-sh/images" \
            --argjson now "$now" \
            '{id:$id,language:$lang,version:$version,variant:$variant,display_name:$display,description:$desc,last_built_at:$now}')
          curl -fSs -X POST https://api.rehearse.sh/v1/internal/catalog \
            -H "Authorization: Bearer $CATALOG_ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"

  notify-failure:
    needs: build
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Slack notify
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "no SLACK_WEBHOOK; skipping"
            exit 0
          fi
          curl -fSs -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"Image build failed: $RUN_URL\"}"
